<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Супер важливий тест</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            overflow: hidden; /* Щоб кнопка не створювала прокрутку */
        }
        h1 {
            font-size: 48px;
            margin-bottom: 50px;
        }
        .buttons {
            display: flex;
            gap: 20px;
        }
        button {
            padding: 10px 30px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            transition: 0.2s;
        }
        #yes-btn {
            background-color: #ff4d4d;
            color: white;
        }
        #no-btn {
            background-color: #4CAF50;
            color: white;
            position: absolute; /* Дозволяє кнопці вільно рухатись */
            left: 55%;
            top: 55%;
        }
    </style>
</head>
<body>

    <h1 id="main-label">Ти лох? 😏</h1>

    <div class="buttons">
        <button id="yes-btn" onclick="sayYes()">Так 😔</button>
        <button id="no-btn" onmouseover="moveButton()">Ні 😎</button>
    </div>

    <script>
        function sayYes() {
            document.getElementById('main-label').innerText = "Я так і знав 😂";
            document.getElementById('no-btn').style.display = 'none'; // Ховаємо кнопку "Ні"
        }

        function moveButton() {
            const btn = document.getElementById('no-btn');
            // Обчислюємо випадкові координати, щоб кнопка не вилазила за межі екрана
            const x = Math.random() * (window.innerWidth - btn.clientWidth);
            const y = Math.random() * (window.innerHeight - btn.clientHeight);
            
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }
    </script>

</body>
</html>
