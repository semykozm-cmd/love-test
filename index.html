<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для моєї найкращої ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #fff0f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 90%; text-align: center; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 10px; background-color: #ff69b4; color: white; margin-top: 20px; }
        .hidden { display: none; }
        img { max-width: 100%; border-radius: 15px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="s1" class="container">
    <h1>Привіт, кицю! 👋</h1>
    <p>Я зробив цей сайт для тебе... ❤️</p>
    <button class="btn" onclick="go(2)">Почати пригоду ✨</button>
</div>

<div id="s2" class="container hidden">
    <h1>Наші спогади ✨</h1>
    <img src="IMG_9243.webp">
    <img src="IMG_9552.webp">
    <img src="IMG_0565.webp">
    <img src="IMG_9866.webp">
    <img src="IMG_0651.webp">
    <img src="IMG_0974.webp">
    <button class="btn" onclick="go(3)">Далі 🎁</button>
</div>

<div id="s3" class="container hidden">
    <h1>Я ТЕБЕ ЛЮБЛЮ! ❤️</h1>
    <p>З 8 березня, сонечко!</p>
    <button class="btn" onclick="confetti(); this.innerText='Обійняв! 🥰'">Тицяй сюди! 🎉</button>
</div>

<script>
    function go(n) {
        document.getElementById('s1').classList.add('hidden');
        document.getElementById('s2').classList.add('hidden');
        document.getElementById('s3').classList.add('hidden');
        document.getElementById('s' + n).classList.remove('hidden');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
