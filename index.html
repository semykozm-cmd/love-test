<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебе ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fff0f5; color: #333; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .container { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 550px; width: 90%; text-align: center; }
        h1 { color: #d02090; }
        .btn { padding: 12px 25px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 15px; background-color: #ff69b4; color: white; transition: 0.3s; }
        .btn:hover { background-color: #ff1493; transform: scale(1.05); }
        .hidden { display: none; }
        .options { text-align: left; display: inline-block; margin: 20px 0; }
        .option { margin: 12px 0; font-size: 18px; display: block; cursor: pointer; }
        .option input { margin-right: 10px; transform: scale(1.3); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .card { width: 60px; height: 60px; background-color: #ffb6c1; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border-radius: 12px; color: transparent; user-select: none; }
        .card.open { background-color: white; border: 2px solid #ffb6c1; color: black; }
    </style>
</head>
<body>

<div class="container" id="step1">
    <h1>Привіт, кицю! 👋</h1>
    <p>Я зробив це спеціально для тебе до 8 березня...</p>
    <p>Натисни на кнопку, якщо готова до маленького сюрпризу! ✨</p>
    <button class="btn" onclick="nextStep(1, 2)">Почати ❤️</button>
</div>

<div class="container hidden" id="step2">
    <h1>Чому я тебе люблю? ❤️</h1>
    <p>(Можна вибрати декілька варіантів)</p>
    <div class="options">
        <label class="option"><input type="checkbox" class="love-opt"> Бо ти неймовірно красива 😍</label>
        <label class="option"><input type="checkbox" class="love-opt"> За твоє почуття гумору 😂</label>
        <label class="option"><input type="checkbox" class="love-opt"> Бо ти дуже турботлива 🤗</label>
        <label class="option"><input type="checkbox" class="love-opt"> За твій милий сміх 🍓</label>
        <label class="option"><input type="checkbox" class="love-opt"> Бо ти особлива для мене ✨</label>
        <label class="option"><input type="checkbox" class="love-opt"> Просто за те, що ти поруч ❤️</label>
    </div>
    <br>
    <button class="btn" onclick="checkTest()">Далі</button>
    <button class="btn" style="background-color: #ccc;" onclick="funnySkip()">Пропустити</button>
    <p id="funny-text" style="color: red; font-weight: bold; margin-top: 10px;"></p>
</div>

<div class="container hidden" id="step3">
    <h1>Маленька гра 🎮</h1>
    <p>Знайди всі пари емодзі!</p>
    <div class="grid" id="grid"></div>
</div>

<div class="container hidden" id="step5">
    <h1>Я ТЕБЕ ЛЮБЛЮ! ❤️</h1>
    <p>Зі святом 8 березня! Дякую, що ти є в моєму житті.</p>
    <br>
    <button class="btn" id="final-btn" onclick="celebrate()">Я тебе теж! 🥰</button>
</div>

<script>
    function nextStep(current, next) {
        document.getElementById('step' + current).classList.add('hidden');
        document.getElementById('step' + next).classList.remove('hidden');
        if (next === 3) initGame();
    }

    function funnySkip() {
        const phrases = [
            "Ей, так не можна! Вибирай давай! 😤",
            "Хитра яка! Ану постав хоча б пару галочок! 😂",
            "Я старався, писав, а ти 'пропустити'? Вибери щось нормальне! ✨"
        ];
        document.getElementById('funny-text').innerText = phrases[Math.floor(Math.random() * phrases.length)];
    }

    function checkTest() {
        if (document.querySelectorAll('.love-opt:checked').length < 1) {
            document.getElementById('funny-text').innerText = "Ну вибери хоча б один варіант! ❤️";
        } else {
            nextStep(2, 3);
        }
    }

    function initGame() {
        const symbols = ["❤️","🌸","🍓","💎","🎀","🎁","❤️","🌸","🍓","💎","🎀","🎁"];
        let shuffled = symbols.sort(() => 0.5 - Math.random());
        const grid = document.getElementById('grid');
        let firstCard = null, matched = 0;

        shuffled.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = s;
            card.onclick = function() {
                if (this.classList.contains('open') || firstCard === this) return;
                this.classList.add('open');
                if (!firstCard) { firstCard = this; } 
                else {
                    if (firstCard.innerText === this.innerText) {
                        matched++; firstCard = null;
                        if (matched === 6) setTimeout(() => nextStep(3, 5), 1000);
                    } else {
                        let prev = firstCard; firstCard = null;
                        setTimeout(() => { prev.classList.remove('open'); this.classList.remove('open'); }, 500);
                    }
                }
            };
            grid.appendChild(card);
        });
    }

    function celebrate() {
        const duration = 5 * 1000;
        const animationEnd = Date.now() + duration;
        const interval = setInterval(function() {
            const timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            confetti({
                particleCount: 50, spread: 360,
                origin: { x: Math.random(), y: Math.random() - 0.2 },
                shapes: ['heart'], colors: ['#ff69b4', '#ff1493']
            });
        }, 250);
        document.getElementById('final-btn').innerText = "Цьом! 🥰";
    }
</script>
</body>
</html>
